<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiii 👋</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #FFF5E6 0%, #FFE8D1 100%);
            padding: 20px;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', cursive, sans-serif;
            overflow: hidden;
        }

        .character {
            font-size: 120px;
            margin-bottom: 30px;
            animation: searching 2s infinite;
            transform-origin: center;
        }

        @keyframes searching {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(30px) rotate(-5deg); }
            50% { transform: translateX(0) rotate(0deg); }
            75% { transform: translateX(-30px) rotate(5deg); }
        }

        .eyes {
            font-size: 60px;
            animation: blinking 0.5s infinite;
            display: inline-block;
        }

        @keyframes blinking {
            0%, 49%, 100% { opacity: 1; }
            50%, 99% { opacity: 0; }
        }

        .search-text {
            font-size: 24px;
            color: #4ECDC4;
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-in-out;
            font-weight: bold;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button-container {
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1s forwards;
            opacity: 0;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.3);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .cute-btn {
            background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 15px rgba(78, 205, 196, 0.4);
            transition: all 0.3s ease;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', cursive, sans-serif;
        }

        .cute-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(78, 205, 196, 0.6);
        }

        .cute-btn:active {
            transform: translateY(-1px);
        }

        .message-box {
            margin-top: 40px;
            text-align: center;
            animation: slideInFromBottom 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: none;
        }

        .message-box.show {
            display: block;
        }

        @keyframes slideInFromBottom {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-text {
            font-size: 36px;
            color: #4ECDC4;
            font-weight: bold;
            margin: 20px 0;
            animation: bounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .confetti {
            position: fixed;
            font-size: 30px;
            animation: confettiFall 2s linear forwards;
            pointer-events: none;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .emoji-spin {
            display: inline-block;
            animation: spin 0.6s ease-in-out;
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="character">
            <span>🐱</span><span class="eyes">👀</span>
        </div>

        <div class="search-text">Where you at? 🔍</div>

        <div class="button-container">
            <button class="cute-btn" onclick="showMessage()">
                Hellooooooo.. Do you remember my name?? 😆
            </button>
        </div>

        <div class="message-box" id="messageBox">
            <div class="message-text">
                How are you? <span class="emoji-spin">😎</span>
            </div>
        </div>
    </div>

    <script>
        function showMessage() {
            const messageBox = document.getElementById('messageBox');
            messageBox.classList.add('show');
            
            // Create fun confetti
            const emojis = ['⭐', '✨', '🎉', '😄', '👋'];
            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-50px';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 2000);
                }, i * 120);
            }
        }
    </script>
</body>
</html>
